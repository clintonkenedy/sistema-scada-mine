<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Control Camión 2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Barra de estado ── */
    #topbar {
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    #dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #e74c3c;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-msg { color: #888; }

    /* ── Tabs ── */
    #tab-bar {
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
    }
    .tab {
      padding: 10px 24px;
      font-size: 13px;
      color: #888;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }
    .tab:hover { color: #e0e0e0; }
    .tab.active { color: #e0e0e0; border-bottom-color: #569cd6; }

    /* ── Paneles ── */
    .panel { display: none; flex: 1; padding: 24px; flex-direction: column; gap: 16px; overflow-y: auto; }
    .panel.active { display: flex; }

    /* ── Control ── */
    #estado {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #888;
      transition: color 0.3s;
    }
    #estado.on { color: #2ecc71; }

    #btn-accion {
      width: 100%;
      padding: 20px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: #2ecc71;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-accion:hover { filter: brightness(0.88); }
    #btn-accion:disabled { background: #444; color: #888; cursor: not-allowed; }
    #btn-accion.sending { background: #e74c3c; }

    #btn-reconectar {
      padding: 9px 18px;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      align-self: flex-start;
    }
    #btn-reconectar:hover { border-color: #888; }

    /* ── Monitor serial ── */
    #monitor {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      overflow-y: auto;
      padding: 10px 12px;
      font-family: "Consolas", monospace;
      font-size: 12px;
      line-height: 1.7;
    }
    .ts  { color: #6a9955; }
    .sys { color: #569cd6; }
    .err { color: #e74c3c; }
    .msg { color: #d4d4d4; }

    #monitor-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #line-count { font-size: 11px; color: #888; margin-left: auto; }
    label { font-size: 12px; color: #888; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    input[type=checkbox] { accent-color: #569cd6; }
    .small-btn {
      padding: 5px 14px;
      font-size: 12px;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #2a2a4a;
      border-radius: 5px;
      cursor: pointer;
    }
    .small-btn:hover { border-color: #888; }
  </style>
</head>
<body>

<div id="topbar">
  <div id="dot"></div>
  <span id="status-msg">Conectando…</span>
</div>

<div id="tab-bar">
  <button class="tab active" onclick="tab('control')">Control</button>
  <button class="tab"        onclick="tab('monitor')">Monitor Serial</button>
</div>

<!-- Control -->
<div id="panel-control" class="panel active">
  <div id="estado">Camión 2: APAGADO</div>

  <button id="btn-accion" disabled onclick="togglePulso()">
    ENCENDER CAMIÓN 2
  </button>

  <button id="btn-reconectar" onclick="reconectar()">Reconectar</button>
</div>

<!-- Monitor -->
<div id="panel-monitor" class="panel">
  <div id="monitor"></div>
  <div id="monitor-bar">
    <label><input type="checkbox" id="autoscroll" checked> Auto-scroll</label>
    <span id="line-count">0 líneas</span>
    <button class="small-btn" onclick="limpiar()">Limpiar</button>
  </div>
</div>

<script>
  let ws, enviando = false, lines = 0, retryTimer;

  function connect() {
    ws = new WebSocket("ws://localhost:8765");

    ws.onopen = () => {
      clearTimeout(retryTimer);
      setDot(true);
      log("Servidor conectado.", "sys");
    };

    ws.onclose = () => {
      setDot(false);
      document.getElementById("status-msg").textContent = "Sin servidor — ¿está corriendo server.py?";
      document.getElementById("btn-accion").disabled = true;
      log("Sin conexión. Reintentando…", "err");
      retryTimer = setTimeout(connect, 2000);
    };

    ws.onerror = () => {};

    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);

      if (msg.type === "status") {
        setDot(msg.connected);
        document.getElementById("status-msg").textContent = msg.msg;
        document.getElementById("btn-accion").disabled = !msg.connected;
        if (!msg.connected) setApagado();
        log(msg.msg, "sys");
      }
      else if (msg.type === "line") {
        try {
          const d = JSON.parse(msg.data);
          log(
            `lat: ${d.a} | lon: ${d.o} | vel: ${d.v} km/h | ` +
            `roll: ${d.r}° | pitch: ${d.p}° | tolva: ${d.u} | ` +
            `saludVia: ${d.h} | tempMotor: ${d.t}°C | f: ${d.f} | s: ${d.s} | c: ${d.c}`
          );
        } catch {
          log(msg.data);
        }
      }
      else if (msg.type === "pulse") {
        msg.active ? setEncendido() : setApagado();
      }
    };
  }

  function togglePulso() {
    ws.send(JSON.stringify({ cmd: enviando ? "stop_pulse" : "start_pulse" }));
  }

  function reconectar() {
    if (ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ cmd: "reconnect" }));
  }

  function setEncendido() {
    enviando = true;
    document.getElementById("btn-accion").textContent = "DETENER";
    document.getElementById("btn-accion").classList.add("sending");
    const e = document.getElementById("estado");
    e.textContent = "Camión 2: ENCENDIDO";
    e.classList.add("on");
  }

  function setApagado() {
    enviando = false;
    document.getElementById("btn-accion").textContent = "ENCENDER CAMIÓN 2";
    document.getElementById("btn-accion").classList.remove("sending");
    const e = document.getElementById("estado");
    e.textContent = "Camión 2: APAGADO";
    e.classList.remove("on");
  }

  function setDot(on) {
    document.getElementById("dot").style.background = on ? "#2ecc71" : "#e74c3c";
  }

  function log(text, cls = "msg") {
    const m   = document.getElementById("monitor");
    const now = new Date();
    const ts  = now.toTimeString().slice(0,8) + "." + String(now.getMilliseconds()).padStart(3,"0");
    const div = document.createElement("div");
    div.innerHTML = `<span class="ts">[${ts}]</span> <span class="${cls}">${esc(text)}</span>`;
    m.appendChild(div);
    lines++;
    document.getElementById("line-count").textContent = `${lines} líneas`;
    if (lines > 500) { m.removeChild(m.firstChild); lines--; }
    if (document.getElementById("autoscroll").checked) m.scrollTop = m.scrollHeight;
  }

  function limpiar() {
    document.getElementById("monitor").innerHTML = "";
    lines = 0;
    document.getElementById("line-count").textContent = "0 líneas";
  }

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function tab(name) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.getElementById(`panel-${name}`).classList.add("active");
    event.target.classList.add("active");
    if (name === "monitor") {
      const m = document.getElementById("monitor");
      m.scrollTop = m.scrollHeight;
    }
  }

  connect();
</script>
</body>
</html>
