# ============================================================================
# Frontend SCADA Mine — nginx config para producción
# ============================================================================

# Tipos MIME adicionales para fonts y SVG con compresión correcta
types {
    application/wasm                              wasm;
}

# Compresión gzip
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    application/wasm
    application/manifest+json;

server {
    listen       80 default_server;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # ----------------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

    # ----------------------------------------------------------------------
    # Healthcheck endpoint para Dokploy / Docker
    # ----------------------------------------------------------------------
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ----------------------------------------------------------------------
    # Assets con hash en el nombre (Vite genera assets/*-[hash].{js,css})
    # Cache forever — el hash invalida el cache cuando el contenido cambia
    # ----------------------------------------------------------------------
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # ----------------------------------------------------------------------
    # Otros archivos estáticos (iconos, manifest, geojson)
    # Cache moderado
    # ----------------------------------------------------------------------
    location ~* \.(?:ico|gif|jpe?g|png|svg|webp|woff2?|ttf|eot|geojson)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # ----------------------------------------------------------------------
    # index.html — NUNCA cachear (es el entry point que referencia
    # los assets con hash; si se cachea, los usuarios quedan con
    # versión vieja después de un deploy)
    # ----------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ----------------------------------------------------------------------
    # SPA fallback — cualquier ruta no resuelta cae a index.html
    # (necesario para React Router con BrowserRouter)
    # ----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------------------
    # Bloquear archivos sensibles
    # ----------------------------------------------------------------------
    location ~ /\.(ht|env|git) {
        deny all;
        return 404;
    }
}
